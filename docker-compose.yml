services:

  # ===== nginx: 玄関係 =====
  nginx:
    image: nginx:1.21.1
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./laravel:/var/www/
    depends_on:
      - php
      - next
    networks:
      - price-tracker-network

  # ===== php: Laravel =====
  php:
    build: ./docker/php
    container_name: php
    platform: linux/arm64
    volumes:
      - ./laravel:/var/www/
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
    env_file:
      - .env
    depends_on:
      - mysql
    networks:
      - price-tracker-network

  # ===== mysql: データ保管 =====
  mysql:
    image: mysql:8.0.26
    platform: linux/amd64
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command:
      - mysqld
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    networks:
      - price-tracker-network

  # ===== phpmyadmin: DB管理画面 =====
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
      - PMA_USER=${DB_USERNAME}
      - PMA_PASSWORD=${DB_PASSWORD}
    depends_on:
      - mysql
    ports:
      - "8080:80"
    networks:
      - price-tracker-network

  # ===== next: Next.js フロントエンド =====
  next:
    build: ./docker/next
    container_name: next
    platform: linux/arm64
    tty: true
    volumes:
      - ./frontend:/app
    working_dir: /app
    ports:
      - "3000:3000"
    command: sh -c "rm -rf node_modules && npm install && npm run dev"
    environment:
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost/api
    depends_on:
      - php
    networks:
      - price-tracker-network

  # ===== python: スクレイピング =====
  python:
    build: ./docker/python
    container_name: python
    platform: linux/arm64
    volumes:
      - ./python:/app
    ports:
      - "8001:8000"
    env_file:
      - ./python/.env
    depends_on:
      - mysql
    networks:
      - price-tracker-network

networks:
  price-tracker-network:
    driver: bridge